<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benbase - Downloaded Files</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .results-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .results-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 16px;
      gap: 12px;
    }

    .file-list {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
    }

    .file-item:last-child {
      border-bottom: none;
    }

    .file-item:hover {
      background: var(--bg-secondary);
    }

    .file-icon {
      width: 32px;
      height: 32px;
      background: var(--accent-light);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      flex-shrink: 0;
    }

    .file-icon svg {
      width: 16px;
      height: 16px;
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .file-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .file-actions .btn {
      padding: 6px 12px;
      font-size: 12px;
    }

    .empty-results {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-secondary);
    }

    .empty-results-icon {
      font-size: 48px;
      opacity: 0.2;
      margin-bottom: 16px;
    }

    .empty-results h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .header-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 6px;
      transition: var(--transition);
    }

    .header-back:hover {
      background: var(--bg-tertiary);
      color: var(--text);
    }

    @media (max-width: 768px) {
      .results-page {
        padding: 16px;
      }

      .file-item {
        flex-wrap: wrap;
        gap: 8px;
      }

      .file-info {
        flex: 1 1 calc(100% - 44px);
      }

      .file-actions {
        width: 100%;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <a href="/" class="header-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </a>
      <div>
        <h4>Benbase</h4>
        <h5>Downloaded Files</h5>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="theme-toggle" title="Toggle theme">
        <span id="theme-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </span>
      </button>
    </div>
  </header>

  <main class="results-page">
    <div class="results-toolbar">
      <button class="btn btn-sm" id="refresh-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        Refresh
      </button>
    </div>

    <div id="results-container">
      <div class="empty-results">
        <div class="empty-results-icon">📁</div>
        <h3>Loading...</h3>
      </div>
    </div>
  </main>

  <script>
    // Theme handling
    function loadTheme() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeIcon(theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon(next);
    }

    function updateThemeIcon(theme) {
      const moonIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
      const sunIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;
      document.getElementById('theme-icon').innerHTML = theme === 'dark' ? sunIcon : moonIcon;
    }

    // Format file size
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // Format date
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // Get file icon based on extension
    function getFileIcon(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      if (ext === 'pdf') {
        return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>`;
      }
      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
        <polyline points="13 2 13 9 20 9"></polyline>
      </svg>`;
    }

    // Load results
    async function loadResults() {
      const container = document.getElementById('results-container');

      try {
        const res = await fetch('/api/results');
        const files = await res.json();

        if (!files.length) {
          container.innerHTML = `
            <div class="empty-results">
              <div class="empty-results-icon">📁</div>
              <h3>No files yet</h3>
              <p>Downloaded files will appear here</p>
            </div>
          `;
          return;
        }

        container.innerHTML = `
          <div class="file-list">
            ${files.map(file => `
              <div class="file-item">
                <div class="file-icon">
                  ${getFileIcon(file.name)}
                </div>
                <div class="file-info">
                  <div class="file-name" title="${file.name}">${file.name}</div>
                  <div class="file-meta">${formatSize(file.size)} · ${formatDate(file.created)}</div>
                </div>
                <div class="file-actions">
                  <a href="/api/results/${encodeURIComponent(file.name)}" class="btn" download>Download</a>
                  <button class="btn btn-primary" onclick="viewFile('${file.name}')">View</button>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (e) {
        container.innerHTML = `
          <div class="empty-results">
            <div class="empty-results-icon">⚠️</div>
            <h3>Error loading files</h3>
            <p>Please try again</p>
          </div>
        `;
      }
    }

    // View file in new tab
    function viewFile(filename) {
      window.open(`/api/results/${encodeURIComponent(filename)}`, '_blank');
    }

    // Initialize
    loadTheme();
    loadResults();

    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
    document.getElementById('refresh-btn').addEventListener('click', loadResults);
  </script>
</body>
</html>
